<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="Arial, sans-serif" font-size="13">
  <title>PA5 Verification — tests per release and current code coverage</title>

  <text x="600" y="22" text-anchor="middle" font-size="15" font-weight="bold">
    PA5 Verification — test counts per release and current code coverage (sum of all 11 PA2 modules)
  </text>

  <!-- ===================== Panel 1: Unit Tests ===================== -->
  <g>
    <text x="200" y="50" text-anchor="middle" font-size="13" font-weight="bold">Unit Tests</text>

    <!-- axes: x 60..340, y 70..280 -->
    <line x1="60" y1="70"  x2="60"  y2="280" stroke="#333"/>
    <line x1="60" y1="280" x2="340" y2="280" stroke="#333"/>

    <!-- y range 0..32000 -->
    <g stroke="#ddd">
      <line x1="60" y1="214.375" x2="340" y2="214.375"/>
      <line x1="60" y1="148.75"  x2="340" y2="148.75"/>
      <line x1="60" y1="83.125"  x2="340" y2="83.125"/>
    </g>
    <g fill="#555" text-anchor="end" font-size="11">
      <text x="55" y="283">0</text>
      <text x="55" y="217">10k</text>
      <text x="55" y="152">20k</text>
      <text x="55" y="86">30k</text>
    </g>

    <!-- scale: y = 280 - v * 0.0065625  (32000 -> 210px) -->
    <!-- v0.5.0-beta 8399 -->
    <rect x="80" y="224.881" width="40" height="55.119" fill="#1f77b4"/>
    <text x="100" y="218.881" text-anchor="middle" font-size="11" fill="#1f77b4" font-weight="bold">8399</text>
    <text x="100" y="298" text-anchor="middle" font-size="11">v0.5.0-beta</text>
    <!-- v0.6.0 8409 -->
    <rect x="150" y="224.815" width="40" height="55.185" fill="#1f77b4"/>
    <text x="170" y="218.815" text-anchor="middle" font-size="11" fill="#1f77b4" font-weight="bold">8409</text>
    <text x="170" y="298" text-anchor="middle" font-size="11">v0.6.0</text>
    <!-- v0.7.0 8718 -->
    <rect x="220" y="222.787" width="40" height="57.213" fill="#1f77b4"/>
    <text x="240" y="216.787" text-anchor="middle" font-size="11" fill="#1f77b4" font-weight="bold">8718</text>
    <text x="240" y="298" text-anchor="middle" font-size="11">v0.7.0</text>
    <!-- v0.8 30701 (curated table sum) -->
    <rect x="290" y="78.525" width="40" height="201.475" fill="#1f77b4"/>
    <text x="310" y="72.525" text-anchor="middle" font-size="11" fill="#1f77b4" font-weight="bold">30701</text>
    <text x="310" y="298" text-anchor="middle" font-size="11">v0.8</text>
  </g>

  <!-- ===================== Panel 2: Integration Tests ===================== -->
  <g>
    <text x="600" y="50" text-anchor="middle" font-size="13" font-weight="bold">Integration Tests</text>

    <!-- axes: x 460..740, y 70..280 -->
    <line x1="460" y1="70"  x2="460" y2="280" stroke="#333"/>
    <line x1="460" y1="280" x2="740" y2="280" stroke="#333"/>

    <!-- y range 0..200 -->
    <g stroke="#ddd">
      <line x1="460" y1="227.5" x2="740" y2="227.5"/>
      <line x1="460" y1="175"   x2="740" y2="175"/>
      <line x1="460" y1="122.5" x2="740" y2="122.5"/>
    </g>
    <g fill="#555" text-anchor="end" font-size="11">
      <text x="455" y="283">0</text>
      <text x="455" y="230.5">50</text>
      <text x="455" y="178">100</text>
      <text x="455" y="125.5">150</text>
    </g>

    <!-- scale: y = 280 - v * 1.05  (200 -> 210px) -->
    <!-- v0.5.0-beta: comp=15 feat=3 -->
    <rect x="475" y="264.25" width="20" height="15.75" fill="#ff7f0e"/>
    <rect x="497" y="276.85" width="20" height="3.15"  fill="#9467bd"/>
    <text x="505" y="298" text-anchor="middle" font-size="11">v0.5.0-beta</text>
    <text x="485" y="260" text-anchor="middle" font-size="10" fill="#ff7f0e">15</text>
    <text x="507" y="272" text-anchor="middle" font-size="10" fill="#9467bd">3</text>
    <!-- v0.6.0: comp=43 feat=13 -->
    <rect x="540" y="234.85" width="20" height="45.15" fill="#ff7f0e"/>
    <rect x="562" y="266.35" width="20" height="13.65" fill="#9467bd"/>
    <text x="570" y="298" text-anchor="middle" font-size="11">v0.6.0</text>
    <text x="550" y="230" text-anchor="middle" font-size="10" fill="#ff7f0e">43</text>
    <text x="572" y="262" text-anchor="middle" font-size="10" fill="#9467bd">13</text>
    <!-- v0.7.0: comp=63 feat=12 -->
    <rect x="605" y="213.85" width="20" height="66.15" fill="#ff7f0e"/>
    <rect x="627" y="267.4" width="20" height="12.6"  fill="#9467bd"/>
    <text x="635" y="298" text-anchor="middle" font-size="11">v0.7.0</text>
    <text x="615" y="209" text-anchor="middle" font-size="10" fill="#ff7f0e">63</text>
    <text x="637" y="263" text-anchor="middle" font-size="10" fill="#9467bd">12</text>
    <!-- v0.8: comp=192 feat=54 (curated table sum) -->
    <rect x="670" y="78.400" width="20" height="201.600" fill="#ff7f0e"/>
    <rect x="692" y="223.300" width="20" height="56.700" fill="#9467bd"/>
    <text x="700" y="298" text-anchor="middle" font-size="11">v0.8</text>
    <text x="680" y="74.400" text-anchor="middle" font-size="10" fill="#ff7f0e">192</text>
    <text x="702" y="219.300" text-anchor="middle" font-size="10" fill="#9467bd">54</text>

    <!-- legend -->
    <g font-size="11">
      <rect x="475" y="318" width="12" height="10" fill="#ff7f0e"/>
      <text x="491" y="327">Component</text>
      <rect x="575" y="318" width="12" height="10" fill="#9467bd"/>
      <text x="591" y="327">Feature</text>
    </g>
  </g>

  <!-- ===================== Panel 3: Coverage now ===================== -->
  <g>
    <text x="1000" y="50" text-anchor="middle" font-size="13" font-weight="bold">Code Coverage (now, weighted by # tests)</text>

    <!-- axes: x 860..1140, y 70..280 -->
    <line x1="860"  y1="70"  x2="860"  y2="280" stroke="#333"/>
    <line x1="860"  y1="280" x2="1140" y2="280" stroke="#333"/>

    <!-- y range 0..100% -->
    <g stroke="#ddd">
      <line x1="860" y1="217" x2="1140" y2="217"/>
      <line x1="860" y1="154" x2="1140" y2="154"/>
      <line x1="860" y1="91"  x2="1140" y2="91"/>
    </g>
    <g fill="#555" text-anchor="end" font-size="11">
      <text x="855" y="283">0%</text>
      <text x="855" y="220">30%</text>
      <text x="855" y="157">60%</text>
      <text x="855" y="94">90%</text>
    </g>
    <!-- 100% reference line -->
    <line x1="860" y1="70" x2="1140" y2="70" stroke="#bbb" stroke-dasharray="3,3"/>
    <text x="855" y="74" text-anchor="end" font-size="11" fill="#888">100%</text>

    <!-- scale: y = 280 - pct * 2.1 -->
    <!-- C0 = 93.5 -->
    <rect x="900" y="83.650" width="80" height="196.350" fill="#17becf"/>
    <text x="940" y="77.650" text-anchor="middle" font-size="13" fill="#17becf" font-weight="bold">93.5%</text>
    <text x="940" y="298" text-anchor="middle" font-weight="bold">C0 (line)</text>
    <!-- C1 = 61.2 -->
    <rect x="1020" y="151.480" width="80" height="128.520" fill="#17becf" fill-opacity="0.55"/>
    <text x="1060" y="145.480" text-anchor="middle" font-size="13" fill="#17becf" font-weight="bold">61.2%</text>
    <text x="1060" y="298" text-anchor="middle" font-weight="bold">C1 (branch)</text>
  </g>

  <!-- footer note -->
  <text x="600" y="350" text-anchor="middle" font-size="11" fill="#666">
    v0.5.0-beta–v0.7.0: static GTEST/Rust/Python test-macro counts  •  v0.8: curated table sum (CI test-run counts, incl. parameterized expansions) — methods diverge, see note  •  Coverage: weighted by unit-test count
  </text>
</svg>
